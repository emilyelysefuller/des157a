<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Emily's Madlib Improvement</title>

    <!-- Normalize CSS -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w==" crossorigin="anonymous" referrerpolicy="no-referrer">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ADLaM+Display&display=swap" rel="stylesheet">

    <!-- My Styles -->
    <link href="styles.css" rel="stylesheet">

    <!-- My JS -->
    <script src="script.js" defer></script>
</head>
<body>
<div id="page">

    <header>
        <h1>Plant Sitting?</h1>
        <h2>Fill out the form to get your instructions!</h2>
    </header>

    <section id="little-guy">
        <img src="../images/littleguy.png" width="254" height="352" alt="plant cartoon">
    </section>

    <main>
        <form id="form">
            <label for="name">Name:</label>
            <input type="text" id="name" placeholder="EX: Bily Bob">

            <label for="plant-adjective">Adjective:</label>
            <input type="text" id="plant-adjective" placeholder="EX: fluffy">

            <label for="liquid">Liquid:</label>
            <input type="text" id="liquid" placeholder="EX: gasoline">

            <label for="adverb">Adverb:</label>
            <input type="text" id="adverb" placeholder="EX: crazily">

            <label for="ing-verb">Verb ending in -ing:</label>
            <input type="text" id="ing-verb" placeholder="EX: Gobbling">

            <label for="number">Number:</label>
            <input type="number" id="number" placeholder="EX: 67">

            <label for="window-adjective">Adjective:</label>
            <input type="text" id="window-adjective" placeholder="EX: Sticky">

            <label for="verb">Verb:</label>
            <input type="text" id="verb" placeholder="EX: Wiggle">

            <label for="object">Object:</label>
            <input type="text" id="object" placeholder="EX: Quesadilla">

            <label for="noun">A noun:</label>
            <input type="text" id="noun" placeholder="EX: Toilet Seat">

            <label for="plant-gift">Object:</label>
                <select id="plant-gift">
                    <option value="">Choose one</option>
                    <option value="suitcase">suitcase</option>
                    <option value="Popsicle">popsicle</option>
                    <option value="box">box</option>
                </select>

            <label for="friend-name">A different name:</label>
            <input type="text" id="friend-name" placeholder="EX: Joe">

            <input type="submit" value="Let's go!">
            
        </form>

        <section id="story" class="hidden">
            <article id="final-note">
                <p>The final story will go here</p>
            </article>

            <button id="again" type="button">Go Again!</button>
        </section>
    </main>

</div>
</body>
</html>
